<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>cmrt-client-playground</title>
    <style>
      body {
        font-family: sans-serif;
        max-width: 600px;
        margin: 2rem auto;
        padding: 0 1rem;
      }
      h1 {
        font-size: 1.4rem;
      }
      label {
        display: block;
        margin-bottom: 0.25rem;
        font-weight: bold;
      }
      textarea {
        width: 100%;
        height: 5rem;
        font-size: 1rem;
        box-sizing: border-box;
        margin-bottom: 0.5rem;
      }
      button {
        font-size: 1rem;
        padding: 0.4rem 1rem;
        cursor: pointer;
      }
      #log {
        margin-top: 1rem;
        padding: 0.75rem;
        background: #f4f4f4;
        border: 1px solid #ccc;
        min-height: 6rem;
        font-family: monospace;
        font-size: 0.9rem;
        white-space: pre-wrap;
        word-break: break-all;
      }
    </style>
  </head>
  <body>
    <h1>cmrt-client-playground</h1>
    <label for="input">コード入力（例: C, Am, G7）</label>
    <textarea id="input" placeholder="C"></textarea>
    <button id="send">MML送信 (POST to cmrt)</button>
    <label for="log" style="margin-top:1rem;">ログ</label>
    <div id="log"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
