<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>cmrt-client-playground</title>
  </head>
  <body>
    <h1>cmrt-client-playground</h1>
    <label for="input">コード入力（例: C, Am, G7）</label>
    <textarea id="input" placeholder="C"></textarea>
    <div class="target-grid">
      <div>
        <label for="track">対象 track</label>
        <input id="track" type="number" min="1" step="1" value="1" />
      </div>
      <div>
        <label for="measure">対象 meas</label>
        <input id="measure" type="number" min="1" step="1" value="1" />
      </div>
    </div>
    <button id="send">MML送信 (POST to cmrt)</button>
    <label class="log-label" for="log">ログ</label>
    <div id="log"></div>
    <p class="footer">
      GitHub:
      <a href="https://github.com/cat2151/cmrt-client-playground">cat2151/cmrt-client-playground</a>
    </p>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
