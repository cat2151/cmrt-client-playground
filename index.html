<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>cmrt-client-playground</title>
  </head>
  <body>
    <h1>cmrt-client-playground</h1>
    <label for="input">コード入力（例: C Am G7 / 改行可）</label>
    <textarea id="input" placeholder="C Am G7"></textarea>
    <div class="target-grid">
      <div>
        <label for="track">chord track</label>
        <input id="track" type="number" min="1" step="1" value="1" />
      </div>
      <div>
        <label for="measure">chord meas</label>
        <input id="measure" type="number" min="1" step="1" value="1" />
      </div>
      <div>
        <label for="bass-track">bass track</label>
        <input id="bass-track" type="number" min="1" step="1" value="1" />
      </div>
    </div>
    <section class="measure-grid-panel" aria-labelledby="measure-grid-heading">
      <div class="measure-grid-toolbar">
        <h2 id="measure-grid-heading">cmrt meas grid</h2>
      </div>
      <div class="target-grid measure-grid-targets">
        <div>
          <label for="grid-track-start">grid track start</label>
          <input id="grid-track-start" type="number" min="1" step="1" value="1" />
        </div>
        <div>
          <label for="grid-track-count">grid track count</label>
          <input id="grid-track-count" type="number" min="1" step="1" value="4" />
        </div>
        <div>
          <label for="grid-measure-start">grid meas start</label>
          <input id="grid-measure-start" type="number" min="0" step="1" value="0" />
        </div>
        <div>
          <label for="grid-measure-count">grid meas count</label>
          <input id="grid-measure-count" type="number" min="1" step="1" value="8" />
        </div>
      </div>
      <div class="measure-grid-scroll">
        <table class="measure-grid-table">
          <thead id="measure-grid-head"></thead>
          <tbody id="measure-grid-body"></tbody>
        </table>
      </div>
    </section>
    <label class="log-label" for="log">ログ</label>
    <div id="log"></div>
    <p class="footer">
      GitHub:
      <a href="https://github.com/cat2151/cmrt-client-playground">cat2151/cmrt-client-playground</a>
    </p>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
